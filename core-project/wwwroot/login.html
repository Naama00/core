<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-96 border-t-4 border-blue-500">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Login to System</h2>
        <div id="message" class="mb-4 text-center min-h-6"></div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" required 
                    class="mt-1 block w-full px-3 py-2 bg-white text-black border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                    placeholder="your@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" required 
                    class="mt-1 block w-full px-3 py-2 bg-white text-black border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                    placeholder="Enter password...">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-semibold">
                Login / Sign Up
            </button>
        </form>

        <div class="my-6 flex items-center">
            <hr class="flex-grow border-gray-300">
            <span class="mx-3 text-gray-500 text-sm">or</span>
            <hr class="flex-grow border-gray-300">
        </div>

        <a href="/api/Auth/login-google" 
            class="w-full bg-red-500 text-white py-2 px-4 rounded-md hover:bg-red-600 transition duration-200 font-semibold flex items-center justify-center gap-2">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Login via Google
        </a>
    </div>

    <script src="js/theme-toggle.js"></script>
    <script src="/js/login.js"></script>
    <script>
        // טפל בחזרה מ-Google עם token ב-query string
        console.log('=== Login.html Script Start ===');
        console.log('Full URL:', window.location.href);
        
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const role = urlParams.get('role');
        
        console.log('Login page - URL params:');
        console.log('Token:', token ? 'exists (' + token.length + ' chars)' : 'missing');
        console.log('Role:', role);
        
        if (token) {
            console.log('Token found - Processing...');
            
            // Extract picture from JWT token
            let picture = null;
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                const decoded = JSON.parse(jsonPayload);
                picture = decoded['picture'] || null;
                console.log('Picture extracted from JWT token:', picture);
            } catch (e) {
                console.error('Error extracting picture from JWT:', e);
            }
            
            console.log('Setting sessionStorage...');
            sessionStorage.setItem('jwtToken', token);
            sessionStorage.setItem('userRole', role);
            
            if (picture) {
                console.log('Picture found - storing in sessionStorage');
                console.log('Picture URL:', picture);
                sessionStorage.setItem('userProfilePicture', picture);
                
                // Verify it was set
                const storedPicture = sessionStorage.getItem('userProfilePicture');
                console.log('Stored picture in sessionStorage:', storedPicture);
            } else {
                console.log('No picture in JWT token - clearing userProfilePicture');
                sessionStorage.removeItem('userProfilePicture');
            }
            
            console.log('Final SessionStorage contents:');
            console.log('jwtToken:', sessionStorage.getItem('jwtToken') ? 'set (' + sessionStorage.getItem('jwtToken').length + ' chars)' : 'not set');
            console.log('userRole:', sessionStorage.getItem('userRole'));
            console.log('userProfilePicture:', sessionStorage.getItem('userProfilePicture'));
            
            console.log('Redirecting to index.html in 100ms...');
            // Redirect with a small delay to ensure sessionStorage is set
            setTimeout(() => {
                console.log('Executing redirect...');
                window.location.href = "index.html";
            }, 100);
        } else {
            console.log('No token found in URL - not redirecting');
        }

        // Check for Google login error
        const error = urlParams.get('error');
        if (error) {
            const messageEl = document.getElementById('message');
            messageEl.style.color = "#ef4444";
            messageEl.textContent = "Error logging in via Google. Please try again.";
        }
        console.log('=== Login.html Script End ===');
    </script>
</body>
</html>
